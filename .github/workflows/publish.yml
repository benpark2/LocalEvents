- name: Execute notebook (build site/index.html)
  env:
    TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
  run: |
    jupyter nbconvert --to notebook --execute notebooks/SOC_Weekly_Event_Finder.ipynb \
      --ExecutePreprocessor.timeout=1200 --output build/executed.ipynb

name: Publish weekly event report

on:
  workflow_dispatch:
  schedule:
    # Runs Tuesdays at 18:00 UTC (10:00am PT in winter, 11:00am PT in summer)
    - cron: "0 18 * * 2"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute notebook (build site/index.html)
        env:
          # Add these in your repo Settings → Secrets and variables → Actions
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          # Optional overrides (repo variables or hardcode here)
          TZ: "America/Los_Angeles"
          HOME_LABEL: "Laguna Niguel, CA"
          HOME_LAT: "33.5225"
          HOME_LON: "-117.7076"
          RADIUS_MILES: "45"
          TOP_N: "10"
        run: |
          mkdir -p build site
          jupyter nbconvert             --to notebook             --execute notebooks/SOC_Weekly_Event_Finder.ipynb             --ExecutePreprocessor.timeout=1200             --output build/executed.ipynb
          test -f site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
