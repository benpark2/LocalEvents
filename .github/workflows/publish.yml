name: Publish weekly event report

on:
  workflow_dispatch:
  schedule:
    # Tuesdays at 18:00 UTC (10am PT winter / 11am PT summer)
    - cron: "0 18 * * 2"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute notebook (build site/index.html)
        shell: bash
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          TZ: America/Los_Angeles
          HOME_LABEL: Laguna Niguel, CA
          HOME_LAT: "33.5225"
          HOME_LON: "-117.7076"
          RADIUS_MILES: "45"
          TOP_N: "10"
        run: |
          set -euxo pipefail
          mkdir -p build site

          jupyter nbconvert \
            --to notebook \
            --execute notebooks/SOC_Weekly_Event_Finder.ipynb \
            --ExecutePreprocessor.timeout=1200 \
            --output executed.ipynb \
            --output-dir build

          echo "Contents of build/:"
          ls -lah build || true

          echo "Contents of site/:"
          ls -lah site || true

          if [[ ! -f site/index.html ]]; then
            echo "::error::site/index.html was not created. Ensure the notebook always writes site/index.html even when no events are found."
            find . -maxdepth 4 -type f -print
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
